# Silence kitty colorscheme
# Ported from the silence.lua Neovim colorscheme

# ── Core ─────────────────────────────────────────────────────────────────────

background            #0d0d0d
foreground            #a0a0a0

# ── Cursor ───────────────────────────────────────────────────────────────────

cursor                #a880e0
cursor_trail_color    #a880e0
cursor_text_color     #000000

# ── Selection ────────────────────────────────────────────────────────────────
# Sourced from Visual: fg=#70a8b0, bg=#141414

selection_foreground  #70a8b0
selection_background  #282828

# ── URL ──────────────────────────────────────────────────────────────────────
# Sourced from Directory

url_color             #7090b0

# ── Tab bar ──────────────────────────────────────────────────────────────────
# Sourced from TabLine / TabLineSel

active_tab_foreground   #a0a0a0
active_tab_background   #141414
inactive_tab_foreground #505050
inactive_tab_background #757575

# ── Marks ────────────────────────────────────────────────────────────────────
# Sourced from Search / IncSearch

mark1_foreground  #000000
mark1_background  #c5c3c3
mark2_foreground  #000000
mark2_background  #c0a080

# ── ANSI palette ─────────────────────────────────────────────────────────────

# Black  — CursorColumn / dark UI chrome
color0  #1a1a1a
# Red    — Error fg
color1  #ff7272
# Green  — String
color2  #7098a0
# Yellow — IncSearch bg / warm accent
color3  #c0a080
# Blue   — Directory
color4  #7090b0
# Magenta — Constant (muted purple-grey)
color5  #8b8098
# Cyan   — Visual fg / Comment-adjacent
color6  #70a8b0
# White  — Normal fg
color7  #a0a0a0

# Bright Black  — subtle UI (LineNrAbove/Below, Conditional)
color8  #555555
# Bright Red    — DiffDelete / hard error
color9  #ff0000
# Bright Green  — DiffAdd
color10 #00cc00
# Bright Yellow — DiffChange
color11 #ff9955
# Bright Blue   — Comment
color12 #90b0e0
# Bright Magenta — Constant (same, brighter context)
color13 #a090b8
# Bright Cyan   — Visual fg (same, brighter context)
color14 #90c8d0
# Bright White  — PmenuSel fg / highlighted text
color15 #e0e0e0
