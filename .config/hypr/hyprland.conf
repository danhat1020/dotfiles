################
### MONITORS ###
################
monitor = eDP-1, 1920x1080@60, 0x0, 1.0

###################
### MY PROGRAMS ###
###################
$terminal = kitty
$browser = firefox
$fileManager = dolphin
$menu = fuzzel

exec-once = awww-daemon
exec-once = waybar
exec-once = wl-gammarelay
exec-once = blueman-applet &
exec-once = wl-paste --watch cliphist store
exec-once = systemctl --user start hyprpolkitagent

env = XCURSOR_SIZE,30
env = HYPRCURSOR_SIZE,30

#####################
### LOOK AND FEEL ###
#####################

general {
  border_size = 2
  gaps_in = 4
  gaps_out = 0
  col.active_border = rgba(255,255,255,0.6)
  col.inactive_border = rgba(255,255,255,0.1)
  layout = dwindle
  resize_on_border = false
  allow_tearing = false
}

decoration {
  rounding = 0
  rounding_power = 2
  blur {
    enabled = false
  }
  shadow {
    enabled = false
  }
}

animations {
  enabled = true
  bezier = smoothOut,   0.25, 0.90, 0.35, 1.00
  bezier = smoothInOut, 0.40, 0.00, 0.20, 1.00
  bezier = subtle,      0.22, 0.90, 0.30, 1.00
  bezier = stylish,     0.20, 1.00, 0.15, 1.00

  animation = windows,       1, 3.0, stylish,     popin 96%
  animation = windowsOut,    1, 2.5, smoothInOut, popin 96%
  animation = border,        1, 4.5, subtle
  animation = fade,          1, 2.5, smoothInOut
  animation = layers,        1, 2.5, subtle
  animation = layersIn,      1, 2.5, subtle,      slide bottom
  animation = layersOut,     1, 2.5, smoothInOut, slide bottom
  animation = fadeLayersIn,  1, 2.5, subtle
  animation = fadeLayersOut, 1, 2.5, smoothInOut
  animation = workspaces,    1, 3.0, stylish,     slide
}

dwindle {
  pseudotile = true
  preserve_split = true
  force_split = 2
}

master {
  new_status = master
}

misc {
  force_default_wallpaper = 0
  disable_hyprland_logo = true
}

#############
### INPUT ###
#############

input {
  kb_layout = us
  kb_variant =
  kb_model =
  kb_options = ctrl:nocaps
  kb_rules =

  sensitivity = 0.2
  accel_profile = "flat"
  force_no_accel = true
  follow_mouse = 0

  repeat_delay = 200
  repeat_rate = 40
  touchpad {
    natural_scroll = true
  }
}

cursor {
  hide_on_key_press = true
}

$LAPTOP_KB_ENABLED = true
device {
  name = at-translated-set-2-keyboard
  enabled = $LAPTOP_KB_ENABLED
}

render {
  cm_sdr_eotf = 3
}

################
### KEYBINDS ###
################

binds {
  drag_threshold = 1
}

$mainMod = SUPER

bind = SUPER,       Q,      killactive,
bind = SUPER SHIFT, Q,      forcekillactive,
bind = SUPER,       X,      exit,
bind = SUPER,       Return, exec, $terminal
bind = SUPER,       B,      exec, $browser
bind = SUPER,       E,      exec, $fileManager
bind = SUPER,       R,      exec, hyprctl reload
bind = SUPER,       W,      exec, ~/.config/waybar/scripts/toggle.sh
bind = SUPER,       F,      togglefloating
bind = SUPER SHIFT, F,      fullscreen

# menu
bind = SUPER, Space, exec, $menu

# move window
bindm = SUPER, mouse:272, movewindow
bindm = SUPER SHIFT, mouse:272, resizewindow 2

# Move focus with mainMod + vim keys
bind = SUPER, H, movefocus, l
bind = SUPER, J, movefocus, d
bind = SUPER, K, movefocus, u
bind = SUPER, L, movefocus, r

# Resize windows
bind = SUPER SHIFT, H, resizeactive, -30 0
bind = SUPER SHIFT, J, resizeactive,  0  30
bind = SUPER SHIFT, K, resizeactive,  0 -30
bind = SUPER SHIFT, L, resizeactive,  30 0

# Switch workspaces with mainMod + [0-9]
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 4%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 4%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e1 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e1 -n2 set 5%-
bindel = SUPER SHIFT, w, exec, busctl --user -- set-property rs.wl-gammarelay / rs.wl.gammarelay Temperature q 6500
bindel = SUPER, Up, exec, busctl --user -- call rs.wl-gammarelay / rs.wl.gammarelay UpdateTemperature n +500
bindel = SUPER, Down, exec, busctl --user -- call rs.wl-gammarelay / rs.wl.gammarelay UpdateTemperature n -500

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
