##### NOTE: initial options
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"
set -g mouse on
set -g set-clipboard on
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set -sg escape-time 0
set -g repeat-time 1000
set -g status-interval 1
set -g detach-on-destroy off
set -g history-limit 40000
### vim copy mode
set-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'C-v' send-keys -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe "xclip -i -sel clip > /dev/null 2>&1"
bind-key -T copy-mode-vi 'Enter' send-keys -X copy-pipe "xclip -i -sel clip > /dev/null 2>&1"
unbind -T copy-mode-vi MouseDragEnd1Pane
##### NOTE: keybinds
### rebind prefix ###
unbind 'C-b'
set -g prefix 'C-space'
bind-key 'C-space' send-prefix
### reload config ###
unbind 'r'
bind 'r' source-file "$HOME/.config/tmux/tmux.conf"
### copy mode
bind 'Enter' copy-mode
### killing ###
bind 'x' kill-pane
bind 'w' kill-window
bind 'q' kill-session
### panes ###
# creation
unbind '%'
unbind '"'
bind 'v' split-window -h -c "#{pane_current_path}"
bind 'h' split-window -v -c "#{pane_current_path}"
# navigation
bind -n 'C-h' select-pane -L
bind -n 'C-j' select-pane -D
bind -n 'C-k' select-pane -U
bind -n 'C-l' select-pane -R
# resize
bind -n 'M-h' resize-pane -L 5
bind -n 'M-j' resize-pane -D 2
bind -n 'M-k' resize-pane -U 2
bind -n 'M-l' resize-pane -R 5
# navigate tabs
bind -n 'M-H' previous-window
bind -n 'M-L' next-window
unbind -n 'C-b'
bind -n 'C-q' resize-pane -Z
bind  'z' resize-pane -Z
# scripts
bind -n 'C-s' popup -w 50% -h 60% -T " Sessionizer " -E "~/scripts/tmux/sessionizer.sh"

bind 'C-j' display-popup -E "tmux list-sessions \
                             | sed -E 's/:.*$//' \
                             | grep -v \"^$(tmux display-message -p '#S')\$\" \
                             | grep -v \"^home\$\" \
                             | fzf --reverse --prompt='$ ' \
                             | xargs tmux switch-client -t"

bind 'C-l' popup -d "#{pane_current_path}" -w 95% -h 90% -T " LazyGit " -E "lazygit"
# misc
bind 'o' if -F '#{==:#{status},on}' 'set -g status off' 'set -g status on'
bind 'k' command-prompt -p "New session:" "new-session -A -s '%%'"
# quality of life
bind 'c' new-window -c "#{pane_current_path}"
bind -r 'n' next-window
bind -r 'p' previous-window
##### NOTE: styling
### define colors
white=#d0d0d0
light_grey=#808080
grey=#505050
dark_grey=#303030
bg=#101010
# vim mode
setw -g mode-style "fg=${white} bg=#002080 bold"
# pane borders
set -g pane-border-style "fg=${dark_grey}"
set -g pane-active-border-style "fg=${light_grey}"
# bar settings
set -g status-position top
set -g status "on"
set -g status-style "fg=${grey} bg=${bg}"
set -g status-justify left
set -g status-left-length "100"
set -g status-right-length "100"
set -g window-status-separator "  "
set -g window-status-style "fg=${grey} bold"
set -g window-status-current-style "fg=${white} bold"
setw -g message-style "fg=#{white} bg=#{bg} bold"
setw -g message-command-style "fg=${white} bg=${bg}"
set -g status-left "#[fg=${light_grey} nobold][#S]  "
